version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: freelance-postgres
    environment:
      POSTGRES_DB: freelance_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    networks:
      - freelance-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: freelance-redis
    ports:
      - "6379:6379"
    networks:
      - freelance-network

volumes:
  postgres_data:
    driver: local

networks:
  freelance-network:
    driver: bridge
